name: Official Gazette — Ingestion Pipeline v3.0

on:
  schedule:
    # Run every night at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - auto
      pdf_url:
        description: 'Specific PDF URL to process (optional)'
        required: false
        default: ''

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run Pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          URL="${{ github.event.inputs.pdf_url }}"
          
          if [ -n "$URL" ]; then
            python scripts/run_pipeline.py --${MODE} --url "$URL"
          else
            python scripts/run_pipeline.py --${MODE}
          fi

      - name: Upload manifests as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-manifests-${{ github.run_id }}
          path: manifests/
          retention-days: 30
